# M4 · metrics.schema v0.2（草案）

**用途**：定义 `benchmarks/runs/{run_id}/{sample_id}.metrics.json` 的字段契约
**引用**：v0.2 主计划书 §6 / §7
**版本**：v0.2-draft-1
**校验方式**：Phase A 落地 `benchmarks/lib/schema_validator.py`，PR 门禁强制校验

---

```yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "M4 Benchmark metrics.json schema (v0.2-draft-1)"
type: object
required:
  - run_metadata
  - reproducibility
  - paper_summary
  - judgment_counts
  - judgment_ids
  - judgment_quality
  - kb_a_hits
  - kb_a_quality
  - kb_b_cards
  - kb_b_quality
  - vision
  - vision_quality
  - performance
  - artifacts
  - passed_checks
properties:

  run_metadata:
    type: object
    required: [run_id, run_kind, sample_id, dataset_version, skill_version, commit_sha, ran_at]
    properties:
      run_id:            {type: string, pattern: "^[0-9]{8}[-_].+"}
      run_kind:          {enum: [mock_ci, real_manual, performance]}
      sample_id:         {type: string}
      dataset_version:   {type: string, pattern: "^benchmark-dataset-v[0-9.]+$"}
      skill_version:     {type: string}
      commit_sha:        {type: string, minLength: 7, maxLength: 40}
      ran_at:            {type: string, format: date-time}
      ark_provider_used: {type: boolean}

  reproducibility:
    type: object
    required:
      - python_version
      - os
      - dependency_lock_hash
      - prompt_template_hash
      - rules_hash
      - kb_a_snapshot_hash
      - kb_b_snapshot_hash
      - vision_schema_hash
      - cache_used
    properties:
      python_version:            {type: string}
      os:                        {type: string}
      architecture:              {type: string}
      dependency_lock_hash:      {type: string, minLength: 64, maxLength: 64}
      model_provider:            {type: [string, "null"], enum: [ark, null]}
      model_id:                  {type: [string, "null"]}
      model_endpoint_id:         {type: [string, "null"]}
      model_config_hash:         {type: [string, "null"]}
      temperature:               {type: [number, "null"]}
      seed:                      {type: [integer, "null"]}
      prompt_template_hash:      {type: string, minLength: 64, maxLength: 64}
      rules_hash:                {type: string, minLength: 64, maxLength: 64}
      agent_instructions_hash:   {type: string}
      kb_a_snapshot_hash:        {type: string, minLength: 64, maxLength: 64}
      kb_b_snapshot_hash:        {type: string}
      vision_schema_hash:        {type: string, minLength: 64, maxLength: 64}
      report_template_hash:      {type: string}
      cache_used:                {type: boolean}

  paper_summary:
    type: object
    required: [paper_type, page_count, word_count]
    properties:
      paper_type:   {enum: [docx, pdf, scan_pdf, synthetic]}
      page_count:   {type: integer, minimum: 0}
      word_count:   {type: integer, minimum: 0}

  # 单纯计数（不做判级）
  judgment_counts:
    type: object
    required: [red, yellow, gray, total]
    properties:
      red:    {type: integer, minimum: 0}
      yellow: {type: integer, minimum: 0}
      gray:   {type: integer, minimum: 0}
      total:  {type: integer, minimum: 0}    # = red+yellow+gray, 不含 green
      by_issue_type:
        type: object
        properties:
          citation:        {type: integer, minimum: 0}
          methods:         {type: integer, minimum: 0}
          writing:         {type: integer, minimum: 0}
          figures_tables:  {type: integer, minimum: 0}
          summary:         {type: integer, minimum: 0}

  # 独立存放"绿色通过项"（P0-5 规范化：不与问题混合）
  passed_checks:
    type: object
    required: [count]
    properties:
      count:  {type: integer, minimum: 0}
      by_issue_type:
        type: object
        properties:
          citation:        {type: integer, minimum: 0}
          methods:         {type: integer, minimum: 0}
          writing:         {type: integer, minimum: 0}
          figures_tables:  {type: integer, minimum: 0}
          summary:         {type: integer, minimum: 0}

  judgment_ids:  # 兼容展示，回归主键是 fingerprints
    type: array
    items: {type: string}

  # fingerprint 列表（回归主键，见主计划 §5）
  judgment_fingerprints:
    type: array
    items: {type: string}

  judgment_quality:
    type: object
    required:
      - anchor_recall
      - forbidden_issue_count
      - false_red_count
      - severity_match_rate
      - location_hit_rate
      - evidence_completeness_rate
      - duplicate_issue_rate
      - repeatability_rate
    properties:
      anchor_recall:                {type: number, minimum: 0, maximum: 1}
      forbidden_issue_count:        {type: integer, minimum: 0}   # 硬门禁必须 = 0
      false_red_count:              {type: integer, minimum: 0}   # 硬门禁必须 = 0
      severity_match_rate:          {type: number, minimum: 0, maximum: 1}
      location_hit_rate:            {type: number, minimum: 0, maximum: 1}
      evidence_completeness_rate:   {type: number, minimum: 0, maximum: 1}
      duplicate_issue_rate:         {type: number, minimum: 0, maximum: 1}
      repeatability_rate:           {type: number, minimum: 0, maximum: 1}

  kb_a_hits:
    type: object
    required: [count, distinct_norms]
    properties:
      count:              {type: integer, minimum: 0}
      distinct_norms:     {type: array, items: {type: string}}
      by_fingerprint:
        type: object
        additionalProperties:
          type: array
          items: {type: string}

  kb_a_quality:
    type: object
    required:
      - norm_precision
      - norm_recall
      - irrelevant_norm_rate
      - unsupported_red_count
    properties:
      norm_precision:         {type: number, minimum: 0, maximum: 1}
      norm_recall:            {type: number, minimum: 0, maximum: 1}
      irrelevant_norm_rate:   {type: number, minimum: 0, maximum: 1}
      unsupported_red_count:  {type: integer, minimum: 0}   # 硬门禁 = 0

  kb_b_cards:
    type: object
    required: [count]
    properties:
      count:              {type: integer, minimum: 0}
      avg_similarity:     {type: [number, "null"]}

  kb_b_quality:
    type: object
    properties:
      precision_at_k:            {type: [number, "null"], minimum: 0, maximum: 1}
      empty_when_irrelevant_rate:{type: [number, "null"], minimum: 0, maximum: 1}
      duplicate_card_rate:       {type: number, minimum: 0, maximum: 1}

  vision:
    type: object
    required: [used]
    properties:
      used:                          {type: boolean}
      regions_dispatched:            {type: integer, minimum: 0}
      regions_recognized:            {type: integer, minimum: 0}
      pages_touched:                 {type: array, items: {type: integer}}
      seconds_total:                 {type: number, minimum: 0}
      tokens_total:                  {type: integer, minimum: 0}
      provider_calls:                {type: integer, minimum: 0}
      failures:                      {type: integer, minimum: 0}
      full_page_uploads_rejected:    {type: integer, minimum: 0}

  vision_quality:
    type: object
    properties:
      # 未启用视觉时全部允许为 null
      region_detection_recall:        {type: [number, "null"], minimum: 0, maximum: 1}
      critical_cell_accuracy:         {type: [number, "null"], minimum: 0, maximum: 1}
      numeric_exact_match:            {type: [number, "null"], minimum: 0, maximum: 1}
      sign_accuracy:                  {type: [number, "null"], minimum: 0, maximum: 1}
      significance_marker_accuracy:   {type: [number, "null"], minimum: 0, maximum: 1}
      header_binding_accuracy:        {type: [number, "null"], minimum: 0, maximum: 1}
      quality_gate_false_pass_count:  {type: integer, minimum: 0}   # 硬门禁 = 0
      visual_false_red_count:         {type: integer, minimum: 0}   # 硬门禁 = 0

  performance:
    type: object
    required:
      - total_seconds_p50
      - total_seconds_p95
      - repeat_count
    properties:
      repeat_count:              {type: integer, minimum: 1}
      total_seconds_p50:         {type: number, minimum: 0}
      total_seconds_p95:         {type: number, minimum: 0}
      parse_seconds:             {type: number, minimum: 0}
      judgment_seconds:          {type: number, minimum: 0}
      kb_bridge_seconds:         {type: number, minimum: 0}
      vision_seconds:            {type: number, minimum: 0}
      render_seconds:            {type: number, minimum: 0}
      tokens_total_p50:          {type: [integer, "null"], minimum: 0}
      estimated_cost_cny_p50:    {type: [number, "null"], minimum: 0}
      peak_rss_mb:               {type: [number, "null"], minimum: 0}

  artifacts:
    type: object
    required:
      - input_sha256
      - canonical_result_json_sha256
    properties:
      input_sha256:                  {type: string, minLength: 64, maxLength: 64}
      canonical_result_json_sha256:  {type: string, minLength: 64, maxLength: 64}
      output_docx_sha256:            {type: [string, "null"]}
      output_html_sha256:            {type: [string, "null"]}
      semantic_report_hash:          {type: [string, "null"]}   # 去除时间戳/路径后

  failures:  # 可选，仅失败运行填写
    type: object
    properties:
      failure_type:      {type: string}   # e.g. rate_limit / timeout / json_parse
      failure_stage:     {type: string}
      failure_message:   {type: string}
      resolved:          {type: boolean}
```

---

## 与主计划的强绑定

- 硬门禁字段（必须 = 0）：`forbidden_issue_count`, `false_red_count`, `unsupported_red_count`, `quality_gate_false_pass_count`, `visual_false_red_count`
- 硬阈值字段（Release Gate §10.1）：`evidence_completeness_rate = 1.0`（红色部分）
- 主键字段：`judgment_fingerprints`
- 展示字段（不参与门禁）：`judgment_ids`, `judgment_counts`

## 首版落地路径

- schema 落地：`benchmarks/schema/metrics.schema.yaml`
- 校验器：`benchmarks/lib/schema_validator.py`（用 `jsonschema` 库）
- CI 挂钩：`.github/workflows/benchmark-offline.yml` 中每个 run 输出都校验
