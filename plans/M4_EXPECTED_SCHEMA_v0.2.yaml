# M4 · expected.schema v0.2（草案）

**用途**：定义 `benchmarks/expected/{sample_id}.expected.yaml` 和 `benchmarks/fixtures/*/expected.yaml` 的字段契约
**引用**：v0.2 主计划书 §4 / §5
**版本**：v0.2-draft-1
**关键强化**：`must_hit` + `forbidden_issues` **双向锚点**，使用稳定 `issue_fingerprint` 而非 `issue_id`

---

```yaml
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "M4 Benchmark expected.yaml schema (v0.2-draft-1)"
type: object
required:
  - sample_id
  - sample_kind
  - paper_title
  - labeling_metadata
  - must_hit
  - forbidden_issues
properties:

  sample_id:      {type: string, pattern: "^(S|D|R|Q|V)[0-9]{2,3}(_[A-Za-z0-9_]+)?$"}
  sample_kind:
    enum: [document, rule_fixture, kb_query_fixture, vision_crop_fixture]
  paper_title:    {type: string}
  dataset_version:{type: string, pattern: "^benchmark-dataset-v[0-9.]+$"}

  labeling_metadata:
    type: object
    required: [labeled_by, labeled_at, reviewed_by, protocol_version]
    properties:
      labeled_by:        {type: string}       # e.g. "user + arkclaw joint"
      labeled_at:        {type: string, format: date}
      reviewed_by:       {type: string}       # 红色问题必须二人
      protocol_version:  {type: string, const: "anti_circular_v1"}
      rationale:         {type: string}       # 为何这样标
      last_updated_at:   {type: string, format: date-time}
      last_updated_by:   {type: string}
      change_reason:     {type: string}

  # ============================
  # 正向锚点（必须命中）
  # ============================
  must_hit:
    type: array
    minItems: 1  # 每份 expected 至少一个正向锚点
    items:
      type: object
      required:
        - fingerprint
        - severity
        - rule_id
        - location
        - expected_evidence
        - confidence
      properties:
        fingerprint:
          type: string
          pattern: "^[a-z0-9_]+\\|[a-z_]+\\|[a-z0-9_]+\\|[a-z0-9_]+$"
          description: "rule_id|issue_type|location_anchor|evidence_key"
        severity:
          enum: [red, yellow, gray]
        rule_id:      {type: string}
        location:
          type: object
          required: [type, anchor]
          properties:
            type:
              enum:
                - reference_entry
                - section
                - table
                - figure
                - equation
                - abstract
                - paragraph
            anchor:      {type: string}   # e.g. "reference_12" / "section_4_2" / "table_3"
            tolerance:   {type: integer, minimum: 0, default: 1}
        expected_evidence:
          type: object
          properties:
            must_contain_any: {type: array, items: {type: string}}
            must_contain_all: {type: array, items: {type: string}}
            must_not_contain: {type: array, items: {type: string}}
        normative_basis:
          type: object
          properties:
            must_include: {type: array, items: {type: string}}
            may_include:  {type: array, items: {type: string}}
            must_not_include: {type: array, items: {type: string}}
        confidence:
          enum: [high, mid, low]
        rationale:
          type: string  # 为何这个应该命中

  # ============================
  # 负向锚点（不得出现，控制假阳性 / 假红）
  # ============================
  forbidden_issues:
    type: array
    items:
      type: object
      required: [fingerprint, reason]
      properties:
        fingerprint:  {type: string}
        reason:       {type: string}
        severity_scope:
          type: array
          items: {enum: [red, yellow, gray]}
          default: [red]
        rationale:    {type: string}

  # ============================
  # 数量区间（软门禁，仅参考）
  # ============================
  count_expectations:
    type: object
    properties:
      red_min:    {type: integer, minimum: 0}
      red_max:    {type: integer, minimum: 0}
      yellow_min: {type: integer, minimum: 0}
      yellow_max: {type: integer, minimum: 0}
      gray_min:   {type: integer, minimum: 0}
      gray_max:   {type: integer, minimum: 0}

  # ============================
  # KB-A 期望
  # ============================
  kb_a_expectations:
    type: object
    properties:
      must_hit:
        type: array
        items: {type: string}   # norm_id
      must_not_hit:
        type: array
        items: {type: string}
      may_hit:
        type: array
        items: {type: string}

  # ============================
  # KB-B 期望
  # ============================
  kb_b_expectations:
    type: object
    properties:
      relevant_examples_min: {type: integer, minimum: 0}
      require_empty:         {type: boolean, default: false}   # 无适用范例时应为空
      forbidden_examples:
        type: array
        items: {type: string}

  # ============================
  # 视觉期望（仅 vision_crop / 含图片表格的 document）
  # ============================
  vision_expectations:
    type: object
    properties:
      must_have_regions:
        type: array
        items: {type: string}   # e.g. ["table_3", "table_4"]
      table_truths:
        type: array
        items:
          type: object
          required: [region_id, n_rows, n_cols]
          properties:
            region_id:  {type: string}
            caption:    {type: string}
            n_rows:     {type: integer, minimum: 1}
            n_cols:     {type: integer, minimum: 1}
            critical_cells:
              type: array
              items:
                type: object
                required: [row, col, value]
                properties:
                  row:      {type: integer, minimum: 0}
                  col:      {type: integer, minimum: 0}
                  value:    {type: string}
                  sign:     {enum: ["+", "-", "0"]}
                  significance_marker: {enum: ["", "*", "**", "***"]}
                  is_header: {type: boolean, default: false}
      should_downgrade_to_gray:
        type: boolean
        default: false
        description: "低质量样本，应正确降灰而非硬识别"

  # ============================
  # DOCX/PDF 一致性期望（仅同内容对偶样本）
  # ============================
  parity_expectation:
    type: object
    properties:
      pair_with_sample_id: {type: string}
      must_match_fingerprints:
        type: array
        items: {type: string}
      allowed_pdf_only:
        type: array
        items: {type: string}
      allowed_docx_only:
        type: array
        items: {type: string}

  # ============================
  # 性能期望（软门禁，仅参考）
  # ============================
  performance_expectation:
    type: object
    properties:
      total_seconds_max:  {type: number, minimum: 0}
      ark_tokens_max:     {type: integer, minimum: 0}
      estimated_cost_cny_max: {type: number, minimum: 0}
```

---

## fingerprint 归一化示例

```yaml
# ✅ 正确
gb7714_2015_journal_completeness|citation|reference_12|missing_volume_pages
wooldridge_did_parallel_trends|methods|section_4_2|missing_parallel_test
gb7714_2015_intext_reference_consistency|citation|paragraph_5_3|orphan_citation
vision_table_extract|figures_tables|table_3|numeric_mismatch

# ❌ 禁止
R-01                                          # 运行期 ID
参考文献第12条缺卷号                          # 中文原文
citation_error_p18                           # 用页码而非稳定 anchor
```

## 强绑定规则

- 每份 expected **至少一个 must_hit**
- **红色 must_hit 必须 reviewed_by 非空**（协议要求二人复核）
- forbidden_issues 允许为空数组，但**至少显式声明**（防遗忘）
- fingerprint 必须匹配正则 `^[a-z0-9_]+\|[a-z_]+\|[a-z0-9_]+\|[a-z0-9_]+$`
- `labeling_metadata.protocol_version` 必须为 `anti_circular_v1`（P0-3 反循环流程标记）

## 校验挂钩

- `benchmarks/lib/schema_validator.py`
- CI 强制：`benchmark-offline.yml` 每个 expected.yaml 变更时校验
