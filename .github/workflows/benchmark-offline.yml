name: benchmark-offline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  offline-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install core + dev deps (offline benchmark scope)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-benchmark.txt
          # 只装 requirements-benchmark.txt；不装 vision/kb（离线 CI 不接 Ark）

      - name: Assert requirements-core.txt has no test/bench deps
        run: |
          set -e
          # M4 新引入的依赖不得进 core；M3 已存在的 jsonschema 不受本断言约束
          forbidden='pytest|coverage|black|ruff|mypy'
          if grep -Ei "^($forbidden)" requirements-core.txt; then
            echo "requirements-core.txt 包含开发/测试依赖，违反 M4_BUILD_GATE_ADDENDUM.md §4" >&2
            exit 1
          fi
          echo "requirements-core.txt 无 M4 开发/测试依赖 ✅"

      - name: Sanity check schemas
        run: python benchmarks/lib/schema_validator.py --schema-only

      - name: Validate every discovered metrics/expected/manifest
        run: python benchmarks/lib/schema_validator.py --all

      - name: Fingerprint unit tests
        run: python -m pytest benchmarks/tests/ -q

      - name: Secret scan (grep-based, fast tripwire)
        run: |
          set -e
          # 排除 workflow 自身（内含扫描 pattern 本文）
          hits=$(grep -Rn -E \
            '(ARK_API_KEY[[:space:]]*=|ghp_[A-Za-z0-9]{20,}|-----BEGIN [A-Z ]+PRIVATE KEY-----)' \
            benchmarks/ scripts/ \
            --exclude='benchmark-offline.yml' \
            2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "Potential secret found:" >&2
            echo "$hits" >&2
            exit 1
          fi
          echo "no secret patterns found"

      - name: Data isolation scan (M4_BUILD_GATE_ADDENDUM §3)
        run: |
          set -e
          # 禁止生产代码（.py）硬编码 sample_id / 私有样本名
          # .md 文档描述历史样本不属于测试集污染（仅记录完成情况）
          hits=$(grep -RnE \
            '(sample_id\s*==\s*"[SDRQV][0-9]{2,3}|_zhc_)' \
            --include='*.py' \
            scripts/ rules/ agent_instructions/ references/ 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "生产代码硬编码了 Benchmark 样本标识符，违反测试集污染防控：" >&2
            echo "$hits" >&2
            exit 1
          fi
          echo "data isolation scan clean (production .py only)"

      - name: Assert self_check.py works without benchmark deps
        run: python scripts/self_check.py

      - name: CHANGELOG lint (Keep-a-Changelog check)
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md missing" >&2; exit 1
          fi
          python - <<'PY'
          import re, sys
          text = open("CHANGELOG.md", encoding="utf-8").read()
          if "Keep a Changelog" not in text:
              print("CHANGELOG missing Keep-a-Changelog reference", file=sys.stderr); sys.exit(1)
          if "## [" not in text:
              print("CHANGELOG missing version entries", file=sys.stderr); sys.exit(1)
          print("CHANGELOG basic lint ok")
          PY

      - name: Release-Gate check on any run/* (non-strict, allow no baseline)
        run: |
          for d in benchmarks/runs/*/ ; do
            [ -d "$d" ] || continue
            echo "=== $d ==="
            python -m benchmarks.runners.release_gate_check --run "$d" --allow-baseline-none || {
              echo "release_gate_check failed on $d" >&2; exit 1;
            }
          done
