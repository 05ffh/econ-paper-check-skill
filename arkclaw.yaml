# ArkClaw skill 元信息（供仓库/README 展示，非 ArkClaw 运行时必需字段）
# ArkClaw 主要读取 SKILL.md frontmatter；本文件用于 GitHub 展示与 SkillHub 索引。

name: econ-paper-check-skill
display_name: 经管论文智检
version: 1.3.0
language: zh-CN
license: MIT
platforms:
  - ArkClaw
  - Claude Code
  - OpenClaw
entry: SKILL.md

description: >
  本科经管论文提交前自检：识别选题、文献、数据变量、模型方法、结构规范风险，
  输出 11 章节 DOCX 质检报告。大模型语义判断 + 脚本 docx/pdf I/O。

input_formats:
  - .docx
  - .pdf   # 默认支持，PDF 场景整体证据强度自动下调一档
output_formats:
  - .docx  # 主交付
  - .html  # webchat 可选预览版

scripts:
  - scripts/preflight.sh
  - scripts/parse_paper.py
  - scripts/parse_docx.py
  - scripts/parse_pdf.py
  - scripts/render_report.py
  - scripts/render_report_html.py

rulesets:
  - rules/rule_registry.yaml
  - rules/non_model_rules.yaml
  - rules/model_rules.yaml

dependencies:
  python: ">=3.9"
  packages:
    - python-docx>=0.8.11
    - pdfplumber>=0.10.0

work_dir: ~/.openclaw/workspace/.econ-paper-check/

triggers:
  zh:
    - 论文自检
    - 论文校对
    - 论文质检
    - 毕业论文检测
    - 本科论文预审
    - 经管论文体检
    - DOCX 论文质检
    - PDF 论文质检
    - 中英文摘要一致性
    - 参考文献一致性

boundaries:
  - 不查重
  - 不代写论文
  - 不判断数据真实性
  - 不联网核验参考文献真伪
  - 不替代导师或学校正式评审
  - 不把硕博盲审标准迁移到本科论文
  - 不因未使用 DID/IV/PSM 判错
