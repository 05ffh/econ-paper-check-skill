version: '1.3'
skill_name: 经管论文智检
description: 规则注册表，负责管理规则组、触发顺序、不适用逻辑和冲突处理。v2迭代修正版。
global_principles:
- 必须先生成 paper_profile，再触发规则。
- 必须先生成 trigger_plan，再执行规则。
- 非模型规则根据论文类型和章节内容触发。
- 模型规则必须条件触发。
- 未检测到某模型时，不得判定论文缺少该模型。
- 证据不足时输出需人工确认。
- 不得把本科论文按硕博盲审标准审查。
- 不得因为未使用 DID、IV、PSM 等高级模型而判定论文有问题。
- 规则严格对应：每个issue必须对应规则库中一条明确规则，不得凭直觉新增规则外检查项。
- 模型评价标准对齐：批评语言强度超证据时，论据必须与所用模型的评价体系一致。
- 分级不可替代：黄色规则不得替代更严重的红色规则，需分别判断。
- 漏检与误检互检：完成诊断后，应对照规则注册表逐条确认是否触发，避免遗漏或误判。
supported_paper_types:
- 经管类实证论文
- 经管类课程论文
- 案例分析论文
- 问卷调查论文
- 调查数据库论文
- 理论综述型论文
unsupported_tasks:
- PDF 完整检测
- 查重
- 论文代写
- 硕士论文盲审
- 博士论文盲审
- 数据真实性判断
- 联网核验参考文献真伪
