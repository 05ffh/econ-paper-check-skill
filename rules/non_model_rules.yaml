version: '1.3'
skill_name: 经管论文智检
description: 非模型类问题规则库，覆盖选题、文献、数据变量、结构表达、摘要、图表和参考文献等问题。v2迭代修正版。
global_principles:
- 所有问题必须基于论文原文证据。
- 不得为了显得有用而强行挑错。
- 课程论文、案例论文不应被硬套实证论文标准。
- 证据不足时输出需人工确认。
- 同类问题应合并。
- 规则严格对应：每个issue必须对应规则库中一条明确规则，不得凭直觉新增规则外检查项。
- 模型评价标准对齐：批评语言强度超证据时，论据必须与所用模型的评价体系一致。参数模型（OLS/Logit）→p值/置信区间；非参数模型（SVM/随机森林）→交叉验证/AUC/准确率。
- 分级不可替代：黄色规则不得替代更严重的红色规则，需分别判断。
- 漏检与误检互检：完成诊断后，应对照规则注册表逐条确认是否触发，避免遗漏或误判。
rule_output_fields:
- rule_id
- group_id
- domain
- issue_type
- default_level
- applies_to
- inspect_locations
- trigger_signals
- evidence_requirement
- suggestion_template
rules:
- rule_id: TQ-QUESTION-001
  group_id: non_model_topic_rules
  domain: 选题与研究问题质检
  issue_type: 研究问题不明确
  default_level: 红色：必改问题
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 题目
  - 摘要
  - 引言
  - 研究内容
  trigger_signals:
  - 大量背景介绍但没有明确提出本文要回答什么问题
  - 引言末段无明确研究问题（仅有背景介绍而无2-3个可回答的研究问题）
  - 研究内容宽泛
  - 后文章节无法对应研究问题
  evidence_requirement: 必须引用题目、摘要或引言中的相关表述。⚠️与LT-HYP-001（缺少假设判黄）不同，本规则判定研究问题不明确判红，不得用后者替代前者降级。两者需分别判断。
  suggestion_template: 建议在引言末段用 2 到 3 个问题明确本文研究对象、核心关系和研究目标，并与后文章节对应。
- rule_id: TQ-SCOPE-001
  group_id: non_model_topic_rules
  domain: 选题与研究问题质检
  issue_type: 选题过大或过空
  default_level: 黄色：建议补充
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 题目
  - 摘要
  - 引言
  trigger_signals:
  - 题目缺少研究对象
  - 缺少地区、行业、时间或数据限定
  - 宏观概念过多但无法落到样本或方法
  - 标题宏观但样本微观（如标题写某大类但样本仅限特定时段、品类或地区）
  evidence_requirement: 必须引用题目或摘要。若发现'标题宏观、样本微观'的不匹配，应同时引用标题与样本说明段落。
  suggestion_template: 建议限定研究对象、样本范围、时间范围、行业或地区，使选题成为可回答、可验证的问题。
- rule_id: TQ-FIT-001
  group_id: non_model_topic_rules
  domain: 选题与研究问题质检
  issue_type: 经管专业属性不足
  default_level: 红色：必改问题
  applies_to:
  - 经管类课程论文
  - 案例分析论文
  - 理论综述型论文
  inspect_locations:
  - 题目
  - 关键词
  - 研究方法
  trigger_signals:
  - 只做技术介绍
  - 只做现象描述
  - 缺少绩效、成本、风险、治理、市场或效率等经管变量
  evidence_requirement: 必须引用题目、关键词或研究方法部分。
  suggestion_template: 建议明确经管问题意识，补充可分析的经济或管理变量。
- rule_id: TQ-CONTRIB-001
  group_id: non_model_topic_rules
  domain: 选题与研究问题质检
  issue_type: 创新点或边际贡献空泛
  default_level: 黄色：建议补充
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 创新点
  - 文献述评
  - 引言
  trigger_signals:
  - 只写选题较新
  - 只写方法较新
  - 没有说明相对已有研究的差异
  evidence_requirement: 必须引用创新点或文献述评部分。
  suggestion_template: 建议从样本、变量、机制、情境或方法角度说明相对已有研究的边际补充。
- rule_id: LT-REVIEW-001
  group_id: non_model_literature_rules
  domain: 文献综述与理论链条质检
  issue_type: 文献综述罗列化
  default_level: 黄色：建议补充
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 问卷调查论文
  - 调查数据库论文
  - 理论综述型论文
  inspect_locations:
  - 文献综述
  trigger_signals:
  - 连续使用某某认为、某某指出、某某研究发现
  - 缺少分类
  - 缺少比较评述
  - 缺少研究缺口
  evidence_requirement: 必须引用文献综述中的代表性段落。
  suggestion_template: 建议将文献综述改为主题分类综述，并在每类文献后补充简要评述和本文切入点。
- rule_id: LT-GAP-001
  group_id: non_model_literature_rules
  domain: 文献综述与理论链条质检
  issue_type: 缺少研究缺口与本文切入点
  default_level: 黄色：建议补充
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 问卷调查论文
  - 调查数据库论文
  - 理论综述型论文
  inspect_locations:
  - 文献综述
  - 引言
  trigger_signals:
  - 已有研究不足未说明
  - 综述结束后直接进入研究设计
  - 本文切入点不清
  evidence_requirement: 必须引用文献综述结尾或引言相关表述。
  suggestion_template: 建议增加已有研究不足与本文切入点，说明本文为何有必要展开。
- rule_id: LT-THEORY-001
  group_id: non_model_literature_rules
  domain: 文献综述与理论链条质检
  issue_type: 理论链条与变量或结论脱节
  default_level: 黄色：建议补充
  applies_to:
  - 经管类实证论文
  - 问卷调查论文
  - 调查数据库论文
  - 案例分析论文
  inspect_locations:
  - 理论基础
  - 研究假设
  - 变量定义
  - 结论
  trigger_signals:
  - 理论只在前文出现
  - 变量选择没有理论依据
  - 结论使用理论概念但前文未解释
  evidence_requirement: 必须引用理论、变量或结论中至少两处相关证据。
  suggestion_template: 建议将理论基础嵌入变量选择、研究假设、结果解释和结论建议。
- rule_id: LT-HYP-001
  group_id: non_model_literature_rules
  domain: 文献综述与理论链条质检
  issue_type: 研究假设缺少文献或理论支撑
  default_level: 黄色：建议补充
  applies_to:
  - 经管类实证论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 理论分析
  - 研究假设
  trigger_signals:
  - 直接提出假设
  - 缺少文献依据
  - 缺少机制推导
  evidence_requirement: 必须引用研究假设附近文本。⚠️本规则判黄色'建议补充'，不得替代更严重的TQ-QUESTION-001（研究问题不明确判红），两者需分别判断。
  suggestion_template: 建议在假设前补充文献依据和逻辑推导，说明变量之间为何存在该关系。
- rule_id: DV-SOURCE-001
  group_id: non_model_data_variable_rules
  domain: 数据、变量与口径质检
  issue_type: 数据来源不可追溯
  default_level: 红色：必改问题
  applies_to:
  - 经管类实证论文
  - 问卷调查论文
  - 调查数据库论文
  - 案例分析论文
  inspect_locations:
  - 数据来源
  - 样本说明
  trigger_signals:
  - 只写来源于数据库或统计年鉴
  - 缺少年份、指标、样本范围或筛选口径
  - 只写数据库名称而缺少查询条件、筛选口径、统计方法与截止时刻
  - 参考市值/指数来源统计口径未说明（如地板价×总量 vs 加权均价×总量、统计截止时刻）
  evidence_requirement: 必须引用数据来源或样本说明段落。若涉及第三方数据平台（如NFTGO、Wind），需说明数据口径、计算方法、截止时刻。
  suggestion_template: 建议补充具体数据来源、时间范围、样本对象、指标口径、筛选规则、缺失值处理方式。对于第三方数据平台，需说明市值/指数的统计口径（计算方法、截止时刻）。
- rule_id: DV-SAMPLE-001
  group_id: non_model_data_variable_rules
  domain: 数据、变量与口径质检
  issue_type: 样本筛选过程不透明
  default_level: 黄色：建议补充
  applies_to:
  - 经管类实证论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 样本选择
  - 数据来源
  trigger_signals:
  - 最终样本量直接出现
  - 未说明剔除规则
  - 缺失值处理不清
  evidence_requirement: 必须引用样本说明或数据来源部分。
  suggestion_template: 建议增加样本筛选流程表，列出初始样本、剔除原因、剔除数量和最终样本。
- rule_id: DV-VAR-001
  group_id: non_model_data_variable_rules
  domain: 数据、变量与口径质检
  issue_type: 核心变量定义不完整
  default_level: 红色：必改问题
  applies_to:
  - 经管类实证论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 变量定义
  - 变量定义表
  - 模型设定
  trigger_signals:
  - 核心变量只有名称和符号
  - 缺少计算公式、单位、来源或含义
  - 变量定义表包含非特征列（如行索引/ID列）
  - 特征变量列表中包含数据集序号或编号列
  evidence_requirement: 必须引用变量定义表或变量说明段落。 若变量定义表中包含索引列或ID列，需特别指出并说明应剔除。
  suggestion_template: 建议完善变量定义表，补充变量名称、符号、含义、计算公式、数据来源、单位和参考依据。
- rule_id: DV-VAR-002
  group_id: non_model_data_variable_rules
  domain: 数据、变量与口径质检
  issue_type: 缺少描述性统计
  default_level: 红色：必改问题（回归模型型）/ 黄色：建议补充（案例/非回归型）
  applies_to:
  - 经管类实证论文
  - 问卷调查论文
  - 调查数据库论文
  - 案例分析论文
  inspect_locations:
  - 数据来源
  - 实证分析
  - 案例分析
  trigger_signals:
  - 使用回归模型但全文无描述性统计表
  - 缺少均值、标准差、最大值、最小值等基本统计量
  - 案例研究型论文缺少关键数据分布特征说明
  evidence_requirement: 必须确认论文是否使用回归模型。has_regression=True时判红色'必改问题'（硬伤）；has_regression=False（如案例研究）时判黄色'建议补充'。降级原因须写入normative_basis。
  suggestion_template: 若为回归模型型：建议补充描述性统计表（均值、标准差、最小值、最大值、观测值数量）。若为案例研究型：建议补充关键数据的分布特征说明（均值、波动范围、中位数等），增强案例分析透明度。
- rule_id: DV-CONSIST-001
  group_id: non_model_data_variable_rules
  domain: 数据、变量与口径质检
  issue_type: 数据或变量口径前后不一致
  default_level: 红色：必改问题
  applies_to:
  - 经管类实证论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 摘要
  - 数据来源
  - 变量定义
  - 结果表
  - 结论
  trigger_signals:
  - 样本期间前后不一致
  - 地区范围前后不一致
  - 变量口径前后不一致
  - 术语口径不一致（如同一模型在不同位置使用不同名称）
  evidence_requirement: 必须同时引用两处不一致证据。 ⚠️本规则仅关注术语口径一致性，不涉及方法选择错误。若术语不一致实质反映方法选择错误（如"线性回归"vs"逻辑回归"用于二分类因变量），应另归MM-GEN-006（方法选择与因变量类型不匹配）处理，两者需分别判断。
  suggestion_template: 建议核对全文样本期间、地区范围、变量口径和观测值数量，并统一表述。
- rule_id: DV-INDEX-001
  group_id: non_model_data_variable_rules
  domain: 数据、变量与口径质检
  issue_type: 综合指标体系说明不完整
  default_level: 红色：必改问题
  applies_to:
  - 经管类实证论文
  - 调查数据库论文
  inspect_locations:
  - 指标体系
  - 熵值法
  - 综合指数构建
  trigger_signals:
  - 使用综合指数但未说明指标方向
  - 未说明标准化
  - 未说明权重计算
  - 未说明综合得分
  evidence_requirement: 必须确认论文使用综合指标、熵值法或综合评价。
  suggestion_template: 建议补充指标体系表、正负向属性、标准化公式、权重计算方法和综合得分计算方式。
- rule_id: DV-CASE-001
  group_id: non_model_data_variable_rules
  domain: 数据、变量与口径质检
  issue_type: 案例材料来源不完整
  default_level: 黄色：建议补充
  applies_to:
  - 案例分析论文
  inspect_locations:
  - 案例背景
  - 案例材料
  - 案例分析
  trigger_signals:
  - 案例事实缺少来源
  - 企业材料或新闻材料来源不清
  - 时间线缺少依据
  evidence_requirement: 必须引用案例材料或案例背景段落。
  suggestion_template: 建议补充案例材料来源、时间范围、资料类型和引用依据。
- rule_id: SN-ABSTRACT-001
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 中文摘要核心要素不完整
  default_level: 黄色：建议补充
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 中文摘要
  trigger_signals:
  - 摘要缺少研究对象
  - 缺少数据或方法
  - 缺少主要结论
  - 缺少建议
  evidence_requirement: 必须引用中文摘要内容。
  suggestion_template: 建议按研究目的、数据方法、主要发现、结论建议的顺序完善中文摘要。
- rule_id: SN-ABSTRACT-EN-001
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 中英文摘要关键信息不一致
  default_level: 红色：必改问题
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 中文摘要
  - 英文摘要
  trigger_signals:
  - 研究对象不一致
  - 样本期间不一致
  - 地区范围不一致
  - 方法不一致
  - 结论方向不一致
  evidence_requirement: 必须同时引用中文摘要和英文摘要证据。
  suggestion_template: 建议建立中英文摘要对照表，统一研究对象、样本期间、方法、结论和关键词。
- rule_id: SN-KEYWORDS-001
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 关键词设置不规范
  default_level: 绿色：优化提升
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 关键词
  - 英文关键词
  trigger_signals:
  - 关键词过多或过少
  - 关键词与主题不对应
  - 英文关键词术语不统一
  - 英文关键词术语不专业（如Value Assessment应为Valuation，Digital Collection应为Digital Collectible）
  - 缺少英文关键词
  evidence_requirement: 必须引用关键词部分。需检查：(1)关键词数量是否合规(3-5个)；(2)中文关键词与英文关键词是否一一对应；(3)英文关键词术语是否专业且统一；(4)英文关键词是否存在。
  suggestion_template: 建议保留 3 到 5 个关键词，统一中英文术语，确保英文关键词使用专业术语。
- rule_id: SN-TABLE-001
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 图表注释不完整
  default_level: 黄色：建议补充
  applies_to:
  - 经管类实证论文
  - 问卷调查论文
  - 调查数据库论文
  - 案例分析论文
  inspect_locations:
  - 图表标题
  - 表格注释
  - 回归表
  trigger_signals:
  - 缺少数据来源
  - 缺少变量单位
  - 缺少括号含义
  - 缺少显著性星号说明
  evidence_requirement: 必须定位到具体图表。
  suggestion_template: 建议统一补充图表标题、变量单位、数据来源、括号含义和显著性星号说明。
- rule_id: SN-CONCLUSION-001
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 结论与前文分析对应不足
  default_level: 黄色：建议补充
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 结论
  - 摘要
  - 结果分析
  trigger_signals:
  - 结论重复摘要
  - 结论没有回应研究问题
  - 结论出现前文未分析的新判断
  evidence_requirement: 必须引用结论和前文研究问题或结果。
  suggestion_template: 建议逐条回应引言中的研究问题，并让每条结论对应前文证据。
- rule_id: SN-ADVICE-001
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 政策建议或管理建议套话化
  default_level: 绿色：优化提升
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 政策建议
  - 管理建议
  - 结论建议
  trigger_signals:
  - 大量使用加强、完善、提高
  - 缺少对象
  - 缺少对应研究发现
  - 缺少具体行动
  evidence_requirement: 必须引用建议部分原文。
  suggestion_template: 建议按研究发现、对应主体、具体行动、预期效果重写建议。
- rule_id: SN-REF-001
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 正文引用与参考文献不一致
  default_level: 红色：必改问题
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  - 理论综述型论文
  inspect_locations:
  - 正文引用
  - 参考文献
  trigger_signals:
  - 正文引用未出现在参考文献
  - 参考文献未在正文引用
  - 引用格式混乱
  - 参考文献文献类型标识错误（如知乎专栏/微信公众号标[J/OL]而非[EB/OL]）
  evidence_requirement: 必须引用正文引用和参考文献条目中的证据；若解析不足，应转需人工确认。⚠️本规则检查正文引用与参考文献双向对应及文献类型标识匹配，不检查参考文献编号连续性。编号连续性不在本规则检查范围内。
  suggestion_template: 建议逐条核对正文引用与文末参考文献，确保双向对应并符合学校格式要求。特别注意：知乎专栏、微信公众号、百家号等非学术来源应标[EB/OL]而非[J/OL]（按GB/T
    7714-2015，[J/OL]仅适用于学术期刊网络版）。
- rule_id: SN-LANG-001
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 语言表达、重复或标题错误
  default_level: 绿色：优化提升
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 全文
  trigger_signals:
  - 重复表达
  - 标题编号错误
  - 语病
  - 术语前后不统一
  - 术语全文不一致（如同一术语在不同位置出现不同写法，如'办税'应为'版税'）
  evidence_requirement: 必须引用具体原句，最多输出 20 条。发现术语笔误后应遍历全文所有text单元，列出完整出现位置（idx清单），确保修改彻底无遗漏。
  suggestion_template: 建议删除重复表达，统一术语和标题编号，并保持学术表达简洁。术语笔误需全文统一修正，列出所有出现位置。
- rule_id: SN-LANG-002
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 量词或计量单位使用不当
  default_level: 绿色：优化提升
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 全文
  trigger_signals:
  - 量词与对象不适配（如NFT头像用'副'而非'个'，'副'适用于成对物品）
  - 计量单位与行业惯例不符
  - 数量与单位组合产生歧义
  evidence_requirement: 必须引用具体原句，注明量词/单位错误及应使用的正确量词/单位。
  suggestion_template: 建议将不恰当量词/单位改为行业标准用法（如NFT数字藏品使用'个'或'份'而非'副'），并全文统一。
- rule_id: SN-TBL-NUM-001
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 表格编号不统一
  default_level: 绿色：优化提升
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 全文表格标题
  trigger_signals:
  - 部分表格缺少编号而其他表格有编号
  - 首个表格无编号但后续表格有编号
  - 表格编号不连续
  evidence_requirement: 必须列出有编号与无编号的表格对比，指出哪些表格缺少编号。
  suggestion_template: 建议为所有表格添加统一编号（从表1开始连续编号），确保全文表格编号完整且连续。
- rule_id: SN-ACK-001
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 致谢过于简短且缺乏具体细节
  default_level: 绿色：优化提升
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 致谢
  trigger_signals:
  - 致谢内容不足150字
  - 致谢多为通用套话（如'感谢我的导师'、'感谢同学'）
  - 致谢未提及导师在选题、方法、数据等方面的具体指导细节
  evidence_requirement: 必须引用致谢原文内容并估算字数。
  suggestion_template: 建议将致谢扩展至200-300字，具体提及导师在选题方向、模型选择、数据获取、论文修改等方面的指导细节，以及同学或家人的具体帮助方式。
- rule_id: SN-TOC-001
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 目录结构不完整或与正文不一致
  default_level: 绿色：优化提升
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 目录
  - 正文章节标题
  trigger_signals:
  - 目录中章节缺少一级编号但正文有编号
  - 目录与正文的章节编号不一致
  - 目录中出现两个相同编号
  - 目录缺少部分章节
  evidence_requirement: 必须同时引用目录和正文中的章节标题，指出不一致之处。
  suggestion_template: 建议核对目录与正文章节编号是否一致，补全缺失编号，确保目录完整反映正文结构。
- rule_id: SN-NUM-DUP-001
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 章节编号重复
  default_level: 绿色：优化提升
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 正文章节标题
  - 目录
  trigger_signals:
  - 同一层级出现两个相同编号（如两个"（三）"）
  - 章节编号不连续
  evidence_requirement: 必须引用两个重复编号的具体位置。
  suggestion_template: 建议修正重复编号，使同一层级编号从1开始连续唯一。
- rule_id: SN-STRUCT-001
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 章节内容重叠
  default_level: 绿色：优化提升
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 章节标题
  - 章节内容
  trigger_signals:
  - 两章或多章内容高度重复
  - 结论与总结/展望分为两章但核心结论相同
  - 不同章节标题但内容实质相同
  evidence_requirement: 必须同时引用两章的核心内容，指出重复之处。
  suggestion_template: 建议将重叠章节合并为一章（如"结论与展望"），避免内容冗余。
- rule_id: SN-ABSTRACT-EN-002
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 英文摘要专业术语翻译偏差
  default_level: 绿色：优化提升
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 英文摘要
  - 中文摘要
  trigger_signals:
  - 英文摘要使用非标准学术术语翻译（如"linear regression"代替"Logistic Regression"）
  - 英文关键词术语翻译与中文关键词不对应
  - 英文摘要方法术语与正文实际方法不一致
  evidence_requirement: 必须同时引用中文摘要和英文摘要的术语，指出翻译偏差。需区分：(1)关键信息不一致（研究对象/方法/结论方向不同）→红色（SN-ABSTRACT-EN-001）；(2)术语翻译偏差（方向正确但术语不准确）→绿色（本规则）。
  suggestion_template: 建议将英文摘要中的非标准术语改为学术标准术语，确保与中文摘要和正文实际方法一致。
- rule_id: SN-TABLE-FMT-001
  group_id: non_model_structure_norm_rules
  domain: 结构表达与学术规范质检
  issue_type: 表格格式不规范
  default_level: 绿色：优化提升
  applies_to:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  inspect_locations:
  - 全文表格
  trigger_signals:
  - 使用文本分隔符（如+/-/|）构成的伪表格而非Word标准表格
  - 部分表格为标准格式而部分为文本格式
  - 表格格式与全文其他表格不统一
  evidence_requirement: 必须指出具体表格编号和格式问题。
  suggestion_template: 建议将文本格式表格改为Word标准表格格式，确保全文表格格式统一。
judgment_logic_corrections_v2:
  description: 迭代v2判定逻辑修正记录，2026-07-15。
  missed_detection_rules_added:
  - rule_id: TQ-QUESTION-001
    original_trigger: 大量背景介绍但没有明确提出本文要回答什么问题
    correction: 增强trigger_signals，加入'引言末段无明确研究问题'。明确与LT-HYP-001分级区分。
  - rule_id: TQ-SCOPE-001
    original_trigger: 题目缺少研究对象
    correction: 新增'标题宏观但样本微观'trigger_signal。
  - rule_id: DV-SOURCE-001
    original_trigger: 只写来源于数据库或统计年鉴
    correction: 增强trigger_signals，加入'只写数据库名称而缺少查询条件/筛选口径/统计方法与截止时刻'及'参考市值统计口径未说明'。扩展applies_to含案例分析论文。
  - rule_id: SN-KEYWORDS-001
    original_trigger: 英文关键词术语不统一
    correction: 扩展trigger_signals含'英文关键词术语不专业'及'缺少英文关键词'。扩展evidence_requirement含4项检查维度。
  false_detection_rules_removed:
  - description: 参考文献编号不连续
    reason: SN-REF-001检查的是正文引用与参考文献双向对应，不检查编号连续性。编号连续性不在规则检查范围内。
    action: 已在SN-REF-001 evidence_requirement中明确排除。
  - description: 要求SVM模型报告p值
    reason: SVM是非参数分类模型，不存在回归系数与p值概念。模型评价标准应与所用模型一致。
    action: 已在global_principles新增'模型评价标准对齐'原则，在model_rules.yaml MM-GEN-003中增加对齐说明。
  level_adjustment_corrections:
  - rule_id: DV-VAR-002
    original_level: 红色
    corrected_level: 红色（回归模型型）/ 黄色（案例/非回归型）
    reason: 案例研究型论文的描述性统计对分析支撑作用低于对回归分析的支撑，不应硬套实证标准。
  - rule_id: MM-GEN-003
    note: 非因果类语言夸大（如'很高的准确率'）超出原trigger_signals显式范围。严格限定MM-GEN-003只覆盖因果表述，非因果类语言夸大归MM-GEN-005（正文结论超出表格结果支持）。
judgment_logic_corrections_v3:
  description: 迭代v3规则改进分支记录，2026-07-15。
  rule_branch_improvements:
  - rule_id: DV-VAR-002
    improvement: 增加'是否回归模型'判断分支
    logic: has_regression=True → 红色（硬伤）；has_regression=False → 黄色（建议补充）。降级原因写入normative_basis。
  - rule_id: SN-REF-001
    improvement: 增加文献类型标识[J/OL]与[EB/OL]的匹配检查
    logic: 知乎/微信公众号/百家号等非学术来源必须标[EB/OL]，不得标[J/OL]。按GB/T 7714-2015，[J/OL]仅适用于学术期刊网络版。不匹配→在student_evidence中逐条指出。
  - rule_id: SN-LANG-001
    improvement: 增加术语全文一致性扫描
    logic: 发现术语笔误后，遍历全文所有text单元，列出完整idx清单（如idx 89/117/127/148），而非只标注一处，确保修改彻底。
normalization_policy:
  allowed_paper_types:
  - 经管类实证论文
  - 经管类课程论文
  - 案例分析论文
  - 问卷调查论文
  - 调查数据库论文
  - 理论综述型论文
  - 非经管类论文
  - 不确定
non_model_rule_evaluation_order:
- 确认论文画像
- 执行选题与研究问题规则
- 执行文献综述与理论链条规则
- 执行数据、变量与口径规则
- 执行结构表达与学术规范规则
- 合并同类问题
- 生成通过项、不适用项和需人工确认项
not_applicable_policy:
- scenario: 案例分析论文未设置变量定义表
  output_status: 不适用
  reason: 案例论文不强制触发变量定义表完整性规则。
- scenario: 理论综述型论文无数据来源
  output_status: 不适用
  reason: 未检测到数据、样本或案例材料，不触发数据来源与变量口径规则。
- scenario: 上传文档疑似片段
  output_status: 需人工确认
  reason: 无法稳定判断完整性问题。
level_adjustment_policy:
  upgrade_to_red:
  - 问题影响论文核心逻辑、数据可复核性或结论可信度。
  - 前后明显不一致且有强证据。
  downgrade_to_yellow:
  - 已有相关内容但说明不充分。
  - 案例研究型论文的描述性统计对分析支撑作用低于对回归分析的支撑（DV-VAR-002分支）。
  downgrade_to_green:
  - 主要属于表达、排版、可读性优化。
  move_to_manual_confirmation:
  - 证据强度为弱。
  - 内容可能位于图片、脚注或附录。
pass_item_generation_policy:
  sources:
  - 论文已明确研究对象和研究问题。
  - 论文已设置文献综述或相关研究章节。
  - 论文说明了数据来源或案例材料来源。
  - 论文设置了变量定义表或指标说明。
  - 论文包含中英文摘要、关键词和参考文献。
  wording:
  - 已呈现
  - 已识别
  - 基本具备
  - 未发现明显问题
non_model_issue_quality_gate:
- 是否适用于当前论文类型。
- 是否有明确原文证据。
- 是否有具体位置。
- 是否避免把未检测到写成学生没有做。
- 是否避免把课程论文或案例论文硬套实证标准。
- 是否给出可执行修改建议。
judgment_logic_corrections_v4:
  description: 迭代v4判定逻辑修正记录（陈煜城论文反馈），2026-07-15。
  missed_detection_rules_added:
  - rule_id: SN-TOC-001
    description: 目录结构不完整
    level: 绿色
  - rule_id: SN-NUM-DUP-001
    description: 章节编号重复
    level: 绿色
  - rule_id: MM-GEN-006
    description: 方法选择与因变量类型不匹配（线性回归不适用二分类）
    level: 黄色
  - rule_id: MM-GBM-001
    description: 缺少GBM模型特征重要性分析
    level: 黄色
  - rule_id: DV-VAR-001
    description: 核心变量定义错误（Number是索引而非特征变量）
    level: 红色
  - rule_id: SN-STRUCT-001
    description: 章节结构重叠
    level: 绿色
  - rule_id: SN-ABSTRACT-EN-002
    description: 英文摘要翻译偏差
    level: 绿色
  - rule_id: SN-TABLE-FMT-001
    description: 表格格式不规范
    level: 绿色
  level_adjustment_corrections:
  - rule_id: MM-GEN-005
    original_level: 红色
    corrected_level: 黄色
    reason: '"显著提升"可能指"统计上显著"而非"效果巨大"，缺乏DeLong检验无法判断是否统计显著。降为黄色，建议补充显著性检验或调整表述为"略有提升"'
  - rule_id: DV-CONSIST-001
    note: 术语口径不一致（黄色）与方法选择错误（MM-GEN-006黄色）需分别判断。术语问题不再混入"结论与表矛盾"红色硬伤
  rule_branch_improvements:
  - rule_id: DV-VAR-001
    improvement: 增加"特征变量是否为索引列"的检查
    logic: 变量定义表中若包含行索引/ID列（如Number、序号），需指出为非特征列并建议剔除
  - rule_id: DV-CONSIST-001
    improvement: 区分"术语不一致"与"方法选择错误"
    logic: 术语口径不一致归DV-CONSIST-001（黄色）；方法选择与因变量类型不匹配归MM-GEN-006（黄色）。两者不得合并
  - rule_id: MM-GEN-002
    improvement: 增加"模型结果完整性检查"
    logic: GBM等树模型应报告特征重要性（feature importance），缺失特征重要性分析无法回扣理论框架→判黄色
  - rule_id: ST-FMT/SN-TOC-001
    improvement: 增加"目录结构完整性检查"
    logic: 目录章节编号应与正文一致，不应出现两个相同编号，缺失编号应补全
