# M4 Benchmark expected.yaml schema (v0.2 canonical)
# 参考：plans/M4_EXPECTED_SCHEMA_v0.2.yaml
# 校验：benchmarks/lib/schema_validator.py

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://github.com/05ffh/econ-paper-check-skill/schema/expected.v0.2.yaml"
title: "M4 Benchmark expected.yaml"
type: object
additionalProperties: false
required:
  - sample_id
  - sample_kind
  - paper_title
  - labeling_metadata
  - forbidden_issues
# NOTE: must_hit 不强制非空。合规样本可以 must_hit=[]，
# 只靠 forbidden_issues + count_expectations 验证。
# 需至少一个断言渠道 (must_hit / forbidden_issues / kb_a_expectations / vision_expectations),
# 由 schema_validator.py 额外检查。

properties:

  sample_id:
    type: string
    pattern: "^(S|D|R|Q|V)[0-9]{2,3}(_[A-Za-z0-9_]+)?$"
  sample_kind:
    enum: [document, rule_fixture, kb_query_fixture, vision_crop_fixture]
  paper_title:      {type: string}
  dataset_version:  {type: string, pattern: "^benchmark-dataset-v[0-9.]+$"}

  labeling_metadata:
    type: object
    required: [labeled_by, labeled_at, reviewed_by, protocol_version]
    additionalProperties: true
    properties:
      labeled_by:       {type: string}
      labeled_at:       {type: string}   # YYYY-MM-DD 或 date-time
      reviewed_by:      {type: string}
      protocol_version: {const: "anti_circular_v1"}
      rationale:        {type: string}
      last_updated_at:  {type: string}
      last_updated_by:  {type: string}
      change_reason:    {type: string}

  must_hit:
    type: array
    minItems: 0
    items:
      type: object
      required: [fingerprint, severity, rule_id, location, expected_evidence, confidence]
      additionalProperties: false
      properties:
        fingerprint:
          type: string
          pattern: "^[a-z0-9_]+\\|[a-z_]+\\|[a-z0-9_]+\\|[a-z0-9_]+$"
        severity:  {enum: [red, yellow, gray]}
        rule_id:   {type: string}
        location:
          type: object
          required: [type, anchor]
          additionalProperties: false
          properties:
            type:      {enum: [reference_entry, section, table, figure, equation, abstract, paragraph]}
            anchor:    {type: string}
            tolerance: {type: integer, minimum: 0}
        expected_evidence:
          type: object
          additionalProperties: false
          properties:
            must_contain_any: {type: array, items: {type: string}}
            must_contain_all: {type: array, items: {type: string}}
            must_not_contain: {type: array, items: {type: string}}
        normative_basis:
          type: object
          additionalProperties: false
          properties:
            must_include:     {type: array, items: {type: string}}
            may_include:      {type: array, items: {type: string}}
            must_not_include: {type: array, items: {type: string}}
        confidence: {enum: [high, mid, low]}
        rationale:  {type: string}

  forbidden_issues:
    type: array
    items:
      type: object
      required: [fingerprint, reason]
      additionalProperties: false
      properties:
        fingerprint:    {type: string}
        reason:         {type: string}
        severity_scope:
          type: array
          items: {enum: [red, yellow, gray]}
        rationale:      {type: string}

  count_expectations:
    type: object
    additionalProperties: false
    properties:
      red_min:    {type: integer, minimum: 0}
      red_max:    {type: integer, minimum: 0}
      yellow_min: {type: integer, minimum: 0}
      yellow_max: {type: integer, minimum: 0}
      gray_min:   {type: integer, minimum: 0}
      gray_max:   {type: integer, minimum: 0}

  kb_a_expectations:
    type: object
    additionalProperties: false
    properties:
      must_hit:     {type: array, items: {type: string}}
      must_not_hit: {type: array, items: {type: string}}
      may_hit:      {type: array, items: {type: string}}

  kb_b_expectations:
    type: object
    additionalProperties: false
    properties:
      relevant_examples_min: {type: integer, minimum: 0}
      require_empty:         {type: boolean}
      forbidden_examples:    {type: array, items: {type: string}}

  vision_expectations:
    type: object
    additionalProperties: false
    properties:
      must_have_regions:
        type: array
        items: {type: string}
      table_truths:
        type: array
        items:
          type: object
          required: [region_id, n_rows, n_cols]
          additionalProperties: false
          properties:
            region_id: {type: string}
            caption:   {type: string}
            n_rows:    {type: integer, minimum: 1}
            n_cols:    {type: integer, minimum: 1}
            critical_cells:
              type: array
              items:
                type: object
                required: [row, col, value]
                additionalProperties: false
                properties:
                  row:                 {type: integer, minimum: 0}
                  col:                 {type: integer, minimum: 0}
                  value:               {type: string}
                  sign:                {enum: ["+", "-", "0"]}
                  significance_marker: {enum: ["", "*", "**", "***"]}
                  is_header:           {type: boolean}
      should_downgrade_to_gray: {type: boolean}

  parity_expectation:
    type: object
    additionalProperties: false
    properties:
      pair_with_sample_id:     {type: string}
      must_match_fingerprints: {type: array, items: {type: string}}
      allowed_pdf_only:        {type: array, items: {type: string}}
      allowed_docx_only:       {type: array, items: {type: string}}

  performance_expectation:
    type: object
    additionalProperties: false
    properties:
      total_seconds_max:      {type: number, minimum: 0}
      ark_tokens_max:         {type: integer, minimum: 0}
      estimated_cost_cny_max: {type: number, minimum: 0}
